<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the cass8 archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a18; --ink2: #5a5a54; --ink3: #9a9a90;
    --paper: #faf9f6; --paper2: #f2f0eb; --paper3: #e8e5de;
    --line: #d8d4cb; --red: #c0392b; --green: #27613a;
  }

  html { scroll-behavior: smooth; }
  body { font-family: 'EB Garamond', Georgia, serif; background: var(--paper); color: var(--ink); min-height: 100vh; }

  /* HEADER */
  header { border-bottom: 1px solid var(--line); padding: 1.75rem 2.5rem; display: flex; align-items: baseline; justify-content: space-between; }
  .site-title { font-size: 1.05rem; font-weight: 400; letter-spacing: 0.14em; text-transform: uppercase; }
  .site-sub { font-size: 0.82rem; color: var(--ink2); font-style: italic; }

  /* FILTERS */
  .filter-bar { padding: 1rem 2.5rem; border-bottom: 1px solid var(--line); display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
  .filter-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--ink3); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 0.5rem; }
  .chip { font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 4px 12px; border: 1px solid var(--line); border-radius: 20px; background: transparent; cursor: pointer; color: var(--ink2); transition: all 0.15s; letter-spacing: 0.04em; }
  .chip:hover { border-color: var(--ink2); color: var(--ink); }
  .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* MASONRY GRID */
  .gallery-wrap { padding: 2rem 2rem; }
  .masonry { columns: 3; gap: 14px; }
  @media (max-width: 900px) { .masonry { columns: 2; } }
  @media (max-width: 560px) { .masonry { columns: 1; } }

  .photo-card { break-inside: avoid; margin-bottom: 14px; cursor: pointer; }
  .photo-card:hover .photo-overlay-hint { opacity: 1; }

  .img-wrap { position: relative; overflow: hidden; border-radius: 2px; background: var(--paper2); line-height: 0; }
  .img-wrap img { width: 100%; display: block; transition: transform 0.4s ease; }
  .photo-card:hover .img-wrap img { transform: scale(1.02); }

  /* inline quote overlay */
  .img-quote { position: absolute; padding: 0.6rem 0.85rem; line-height: 1.4; pointer-events: none; }
  .img-quote.top-left { top: 0; left: 0; text-align: left; }
  .img-quote.top-center { top: 0; left: 50%; transform: translateX(-50%); text-align: center; }
  .img-quote.top-right { top: 0; right: 0; text-align: right; }
  .img-quote.center { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .img-quote.bottom-left { bottom: 0; left: 0; text-align: left; }
  .img-quote.bottom-center { bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; }
  .img-quote.bottom-right { bottom: 0; right: 0; text-align: right; }

  .photo-overlay-hint { position: absolute; top: 8px; right: 8px; opacity: 0; transition: opacity 0.2s; display: flex; gap: 5px; }
  .hint-pill { font-family: 'DM Mono', monospace; font-size: 0.6rem; background: rgba(0,0,0,0.55); color: #fff; padding: 3px 7px; border-radius: 20px; }

  .photo-meta { padding: 8px 2px 0; }
  .photo-title { font-size: 0.95rem; font-weight: 500; }
  .photo-game { font-size: 0.78rem; color: var(--ink3); margin-top: 1px; font-style: italic; }

  .subtitle-quote { font-size: 0.82rem; color: var(--ink2); margin-top: 4px; font-style: italic; padding-left: 2px; border-left: 2px solid var(--line); padding-left: 8px; }

  /* EMPTY */
  .gallery-empty { text-align: center; padding: 6rem 2rem; color: var(--ink3); font-style: italic; font-size: 1.1rem; }

  /* LIGHTBOX */
  .lb-backdrop { display: none; position: fixed; inset: 0; background: rgba(10,10,8,0.92); z-index: 100; overflow-y: auto; }
  .lb-backdrop.open { display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }

  .lb-box { width: 100%; max-width: 900px; margin: auto; }
  .lb-top { display: flex; justify-content: flex-end; margin-bottom: 0.75rem; gap: 0.75rem; }
  .lb-btn { font-family: 'DM Mono', monospace; font-size: 0.7rem; padding: 6px 14px; border-radius: 2px; cursor: pointer; border: 1px solid rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.7); letter-spacing: 0.06em; transition: all 0.15s; }
  .lb-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.5); }
  .lb-btn.active { background: rgba(255,255,255,0.15); color: #fff; }
  .lb-close { margin-left: auto; }

  .lb-img-wrap { position: relative; line-height: 0; border-radius: 2px; overflow: hidden; background: #111; }
  .lb-img-wrap img { width: 100%; display: block; }
  .lb-img-quote { position: absolute; padding: 0.9rem 1.2rem; line-height: 1.5; pointer-events: none; }
  .lb-img-quote.top-left { top: 0; left: 0; }
  .lb-img-quote.top-center { top: 0; left: 50%; transform: translateX(-50%); text-align: center; }
  .lb-img-quote.top-right { top: 0; right: 0; text-align: right; }
  .lb-img-quote.center { top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .lb-img-quote.bottom-left { bottom: 0; left: 0; }
  .lb-img-quote.bottom-center { bottom: 0; left: 50%; transform: translateX(-50%); text-align: center; }
  .lb-img-quote.bottom-right { bottom: 0; right: 0; text-align: right; }

  .lb-meta { padding: 1.25rem 0 0; }
  .lb-title { font-size: 1.35rem; font-weight: 500; color: #fff; margin-bottom: 2px; }
  .lb-game { font-size: 0.85rem; color: rgba(255,255,255,0.45); font-style: italic; }
  .lb-subtitle { font-size: 0.9rem; color: rgba(255,255,255,0.6); margin-top: 0.6rem; font-style: italic; border-left: 2px solid rgba(255,255,255,0.2); padding-left: 0.75rem; }
  .lb-actions { margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }

  /* edit panel */
  .lb-edit { margin-top: 1.5rem; display: none; }
  .lb-edit.open { display: block; }
  .lb-edit-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .lb-edit img { width: 100%; border-radius: 2px; }

  /* nav arrows */
  .lb-nav { display: flex; justify-content: space-between; margin-top: 1.25rem; }
  .lb-nav-btn { font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 7px 18px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.55); border-radius: 2px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.06em; }
  .lb-nav-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
  .lb-nav-btn:disabled { opacity: 0.2; cursor: default; }

  /* loading */
  .loading { text-align: center; padding: 5rem; color: var(--ink3); font-style: italic; }
</style>
</head>
<body>

<header>
  <div>
    <div class="site-title">the cass8 archive</div>
    <div class="site-sub">in-game photography</div>
  </div>
</header>

<div class="filter-bar" id="filter-bar">
  <span class="filter-label">Series</span>
  <button class="chip active" onclick="setFilter('all', this)">All</button>
</div>

<div class="gallery-wrap">
  <div class="loading" id="loading">Loading photographs...</div>
  <div class="masonry" id="masonry" style="display:none"></div>
  <div class="gallery-empty" id="empty" style="display:none">No photographs yet.</div>
</div>

<!-- LIGHTBOX -->
<div class="lb-backdrop" id="lb" onclick="lbClickOutside(event)">
  <div class="lb-box" id="lb-box">
    <div class="lb-top">
      <button class="lb-btn" id="lb-toggle-quote" onclick="toggleQuote()" style="display:none">hide quote</button>
      <button class="lb-btn" id="lb-toggle-edit" onclick="toggleEdit()" style="display:none">show edit</button>
      <button class="lb-btn lb-close" onclick="closeLb()">✕ close</button>
    </div>

    <div class="lb-img-wrap" id="lb-img-wrap">
      <img id="lb-main-img" src="" alt="">
      <div class="lb-img-quote" id="lb-img-quote" style="display:none"></div>
    </div>

    <div class="lb-meta">
      <div class="lb-title" id="lb-title"></div>
      <div class="lb-game" id="lb-game"></div>
      <div class="lb-subtitle" id="lb-subtitle" style="display:none"></div>
      <div class="lb-actions">
        <button class="lb-btn" onclick="downloadOriginal()">↓ download original</button>
        <button class="lb-btn" id="lb-dl-quote" onclick="downloadWithQuote()" style="display:none">↓ download with quote</button>
      </div>
    </div>

    <div class="lb-edit" id="lb-edit">
      <div class="lb-edit-label">Lightroom edit settings</div>
      <img id="lb-edit-img" src="" alt="Lightroom edit screenshot">
    </div>

    <div class="lb-nav">
      <button class="lb-nav-btn" id="lb-prev" onclick="navLb(-1)">← prev</button>
      <button class="lb-nav-btn" id="lb-next" onclick="navLb(1)">next →</button>
    </div>
  </div>
</div>

<script>
let allImages = [];
let filtered = [];
let activeFilter = 'all';
let lbIndex = 0;
let quoteVisible = true;
let editVisible = false;

async function loadGallery() {
  try {
    const r = await fetch('/api/save');
    const data = await r.json();
    allImages = (data.images || []).reverse();
    document.getElementById('loading').style.display = 'none';
    renderFilters();
    applyFilter();
  } catch(e) {
    document.getElementById('loading').textContent = 'Could not load gallery.';
  }
}

function renderFilters() {
  const games = [...new Set(allImages.map(i => i.game).filter(Boolean))];
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '<span class="filter-label">Series</span><button class="chip active" onclick="setFilter(\'all\', this)">All</button>';
  games.forEach(g => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = g;
    b.onclick = function() { setFilter(g, this); };
    bar.appendChild(b);
  });
}

function setFilter(val, el) {
  activeFilter = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  filtered = activeFilter === 'all' ? allImages : allImages.filter(i => i.game === activeFilter);
  renderMasonry();
}

function renderMasonry() {
  const grid = document.getElementById('masonry');
  const empty = document.getElementById('empty');
  if (!filtered.length) { grid.style.display = 'none'; empty.style.display = 'block'; return; }
  grid.style.display = 'block'; empty.style.display = 'none';

  grid.innerHTML = filtered.map((img, idx) => {
    const hasQuote = img.quote && img.quotePosition !== 'subtitle';
    const isSubtitle = img.quote && img.quotePosition === 'subtitle';
    const quoteHTML = hasQuote ? `<div class="img-quote ${img.quotePosition}" style="font-family:${img.quoteFont||'inherit'};color:${img.quoteColor||'#fff'};font-size:${img.quoteSize||'1rem'}">${escHtml(img.quote)}</div>` : '';
    const hints = [];
    if (img.quote) hints.push('quote');
    if (img.editUrl) hints.push('edit');
    return `
      <div class="photo-card" onclick="openLb(${idx})">
        <div class="img-wrap">
          <img src="${img.url}" alt="${escHtml(img.title)}" loading="lazy">
          ${quoteHTML}
          <div class="photo-overlay-hint">${hints.map(h => `<span class="hint-pill">${h}</span>`).join('')}</div>
        </div>
        <div class="photo-meta">
          <div class="photo-title">${escHtml(img.title)}</div>
          <div class="photo-game">${escHtml(img.game || '')}</div>
          ${isSubtitle ? `<div class="subtitle-quote" style="font-family:${img.quoteFont||'inherit'};color:${img.quoteColor||'var(--ink2)'};">${escHtml(img.quote)}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openLb(idx) {
  lbIndex = idx;
  quoteVisible = true;
  editVisible = false;
  renderLb();
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}

function lbClickOutside(e) {
  if (e.target === document.getElementById('lb')) closeLb();
}

function renderLb() {
  const img = filtered[lbIndex];
  if (!img) return;

  document.getElementById('lb-main-img').src = img.url;
  document.getElementById('lb-main-img').alt = img.title;
  document.getElementById('lb-title').textContent = img.title;
  document.getElementById('lb-game').textContent = img.game || '';

  const hasOverlayQuote = img.quote && img.quotePosition !== 'subtitle';
  const isSubtitle = img.quote && img.quotePosition === 'subtitle';

  // subtitle
  const sub = document.getElementById('lb-subtitle');
  if (isSubtitle && img.quote) {
    sub.textContent = img.quote;
    sub.style.fontFamily = img.quoteFont || 'inherit';
    sub.style.display = 'block';
  } else { sub.style.display = 'none'; }

  // overlay quote
  const qEl = document.getElementById('lb-img-quote');
  const toggleBtn = document.getElementById('lb-toggle-quote');
  const dlQuote = document.getElementById('lb-dl-quote');
  if (hasOverlayQuote) {
    qEl.textContent = img.quote;
    qEl.className = 'lb-img-quote ' + img.quotePosition;
    qEl.style.fontFamily = img.quoteFont || 'inherit';
    qEl.style.color = img.quoteColor || '#fff';
    qEl.style.fontSize = img.quoteSize || '1rem';
    qEl.style.display = quoteVisible ? 'block' : 'none';
    toggleBtn.style.display = 'inline-block';
    toggleBtn.textContent = quoteVisible ? 'hide quote' : 'show quote';
    dlQuote.style.display = 'inline-block';
  } else {
    qEl.style.display = 'none';
    toggleBtn.style.display = 'none';
    dlQuote.style.display = 'none';
  }

  // edit
  const editBtn = document.getElementById('lb-toggle-edit');
  const editPanel = document.getElementById('lb-edit');
  if (img.editUrl) {
    document.getElementById('lb-edit-img').src = img.editUrl;
    editBtn.style.display = 'inline-block';
    editBtn.textContent = editVisible ? 'hide edit' : 'show edit';
    editPanel.classList.toggle('open', editVisible);
  } else {
    editBtn.style.display = 'none';
    editPanel.classList.remove('open');
  }

  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === filtered.length - 1;
  document.getElementById('lb-box').scrollTop = 0;
}

function toggleQuote() {
  quoteVisible = !quoteVisible;
  const img = filtered[lbIndex];
  document.getElementById('lb-img-quote').style.display = quoteVisible ? 'block' : 'none';
  document.getElementById('lb-toggle-quote').textContent = quoteVisible ? 'hide quote' : 'show quote';
}

function toggleEdit() {
  editVisible = !editVisible;
  document.getElementById('lb-toggle-edit').textContent = editVisible ? 'hide edit' : 'show edit';
  document.getElementById('lb-edit').classList.toggle('open', editVisible);
}

function navLb(dir) {
  lbIndex = Math.max(0, Math.min(filtered.length - 1, lbIndex + dir));
  quoteVisible = true; editVisible = false;
  renderLb();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft') navLb(-1);
  if (e.key === 'ArrowRight') navLb(1);
});

function downloadOriginal() {
  const img = filtered[lbIndex];
  const a = document.createElement('a');
  a.href = img.url;
  a.download = img.title.replace(/\s+/g, '-') + '.jpg';
  a.target = '_blank';
  a.click();
}

async function downloadWithQuote() {
  const img = filtered[lbIndex];
  if (!img.quote || img.quotePosition === 'subtitle') return downloadOriginal();
  const canvas = document.createElement('canvas');
  const image = new Image();
  image.crossOrigin = 'anonymous';
  image.onload = () => {
    canvas.width = image.naturalWidth;
    canvas.height = image.naturalHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(image, 0, 0);
    const size = parseFloat(img.quoteSize || '1') * 18;
    ctx.font = `${size}px ${img.quoteFont || 'Georgia'}`;
    ctx.fillStyle = img.quoteColor || '#ffffff';
    ctx.textAlign = 'center';
    const pad = size * 0.8;
    const x = img.quotePosition.includes('left') ? pad : img.quotePosition.includes('right') ? canvas.width - pad : canvas.width / 2;
    const y = img.quotePosition.includes('top') ? pad * 2 : img.quotePosition.includes('bottom') ? canvas.height - pad : canvas.height / 2;
    ctx.fillText(img.quote, x, y);
    const a = document.createElement('a');
    a.download = img.title.replace(/\s+/g, '-') + '-with-quote.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  image.src = img.url;
}

loadGallery();
</script>
</body>
</html>
